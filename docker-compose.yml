version: "3.8"

services:
  realdebrid-tool:
    build: .
    container_name: rd-tool
    environment:
      - RD_TOKEN
      - RD_DOWNLOAD_DIR=/downloads
      - RD_MAX_CONCURRENT_DOWNLOADS=3
    # /downloads is already bind-mounted via Proxmox LXC mp2
    # to /storage-pool/media/downloads/complete on the ZFS pool
    # No Docker volume needed — just write to the mount
    ports:
      - "8080:8080"
    restart: "no"  # On-demand service, not auto-start
    networks:
      - default

networks:
  default:
    driver: bridge
