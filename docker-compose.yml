version: "3.8"

services:
  realdebrid-tool:
    build: .
    container_name: rd-tool
    environment:
      - RD_TOKEN
      - RD_DOWNLOAD_DIR=/downloads
      - RD_MAX_CONCURRENT_DOWNLOADS=3
    volumes:
      # CT 101 has /downloads bind-mounted to ZFS pool (mp2)
      # Mount it into the container at the same path
      - /downloads:/downloads
    ports:
      - "8080:8080"
    restart: "no"  # On-demand service, not auto-start
    networks:
      - default

networks:
  default:
    driver: bridge
