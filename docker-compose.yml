version: "3.8"

services:
  realdebrid-tool:
    build: .
    container_name: rd-tool
    environment:
      - RD_TOKEN
      - RD_DOWNLOAD_DIR=/downloads
      - RD_MAX_CONCURRENT_DOWNLOADS=3
    volumes:
      # Downloads land on NAS alongside qBittorrent complete downloads
      - /storage-pool/media/downloads/complete:/downloads
    ports:
      - "8080:8080"
    restart: "no"  # On-demand service, not auto-start
    networks:
      - default

networks:
  default:
    driver: bridge
