version: "3.8"

services:
  realdebrid-tool:
    build: .
    container_name: rd-tool
    environment:
      - RD_TOKEN=${RD_TOKEN:-your_api_token_here}
      - RD_DOWNLOAD_DIR=/downloads
      - RD_MAX_CONCURRENT_DOWNLOADS=3
    volumes:
      # Downloads land on NAS at /storage-pool/media/rd-downloads
      # CT 101 binds to NAS via Samba mount or shared storage
      - /mnt/nas/rd-downloads:/downloads
    ports:
      - "8080:8080"
    restart: "no"  # On-demand service, not auto-start
    networks:
      - default

networks:
  default:
    driver: bridge
